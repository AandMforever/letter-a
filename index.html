<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter A - Guess</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #6b21a8, #ec4899);
    color: white;
    padding-top: 80px;
}

h1 {
    font-size: 3em;
}

input[type=range] {
    width: 80%;
    margin-top: 40px;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 1.1em;
    border: none;
    border-radius: 40px;
    background: #ff4da6;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Letter A 💕</h1>
<h2>A True Love Meter</h2>

<p>Before we scan anything...</p>
<p>Guess how much I love you 💜</p>

<input type="range" min="0" max="100" value="50" id="loveGuess">
<div id="guessValue">50%</div>

<button onclick="saveGuess()">Lock In Guess 💖</button>

<script>
let slider = document.getElementById("loveGuess");
slider.oninput = function() {
    document.getElementById("guessValue").innerHTML = this.value + "%";
}

function saveGuess() {
    localStorage.setItem("loveGuess", slider.value);
    window.location.href = "scan.html";
}
</script>

</body>
</html>
